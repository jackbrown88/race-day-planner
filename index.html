<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zwift Race Day Timeline | Jack Brown Endurance</title>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png">
    <!-- Open Graph / social sharing -->
    <meta property="og:title" content="Zwift Race Day Timeline">
    <meta property="og:description" content="Enter your race start time and get your personalised countdown to peak performance.">
    <meta property="og:image" content="https://jackbrownendurance.github.io/zwift-race-day-planner/slide1.png">
    <meta property="og:url" content="https://jackbrownendurance.github.io/zwift-race-day-planner">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
    <!-- html2canvas for screenshot -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
    <div class="planner" id="planner">
        <img src="slide1.png" id="background" alt="Zwift Race Day Timeline">
        <!-- Input UI -->
        <div class="calculator">
            <label for="raceTime">Enter your race start time</label>
            <div class="input-row">
                <input type="time" id="raceTime">
                <button onclick="generateTimeline()">Go</button>
                <button class="reset-btn" onclick="resetTimeline()">↺</button>
