<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zwift Race Day Timeline | Jack Brown Endurance</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
</head>
<body>
    <div class="planner">
        <img src="slide1.png" id="background" alt="Zwift Race Day Timeline">

        <!-- Input UI -->
        <div class="calculator">
            <label for="raceTime">Race start time</label>
            <div class="input-row">
                <input type="time" id="raceTime">
                <button onclick="generateTimeline()">Go</button>
            </div>
        </div>

        <!-- MY TIME column overlays -->
        <div id="time-t4"  class="race-time"></div>
        <div id="time-t3"  class="race-time"></div>
        <div id="time-t1"  class="race-time"></div>
        <div id="time-t45" class="race-time"></div>
        <div id="time-t40" class="race-time"></div>
        <div id="time-t30" class="race-time"></div>
        <div id="time-t15" class="race-time"></div>
        <div id="time-t10" class="race-time"></div>
        <div id="time-t5"  class="race-time"></div>
        <div id="time-t0"  class="race-time"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
